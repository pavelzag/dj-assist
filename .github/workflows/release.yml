name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish, for example v0.1.0 or v0.2.0-beta.1
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Release
    runs-on: macos-15
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      USE_HARD_LINKS: 'false'
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromaprint
        run: brew install chromaprint

      - name: Download standalone Python runtime
        env:
          PYTHON_STANDALONE_URL: ${{ vars.PYTHON_STANDALONE_URL_MACOS_ARM64 }}
          DEFAULT_PYTHON_STANDALONE_URL: https://github.com/astral-sh/python-build-standalone/releases/download/20260203/cpython-3.11.14%2B20260203-aarch64-apple-darwin-install_only.tar.gz
        run: |
          set -e
          if [ -z "${PYTHON_STANDALONE_URL}" ]; then
            PYTHON_STANDALONE_URL="${DEFAULT_PYTHON_STANDALONE_URL}"
            echo "Repository variable PYTHON_STANDALONE_URL_MACOS_ARM64 is not set. Falling back to ${PYTHON_STANDALONE_URL}."
          fi
          archive="$RUNNER_TEMP/python-standalone.tar.gz"
          extract_root="$RUNNER_TEMP/python-standalone-extract"
          mkdir -p "$extract_root"
          curl -L "$PYTHON_STANDALONE_URL" -o "$archive"
          tar -xf "$archive" -C "$extract_root"
          py_bin="$(
            find "$extract_root" \( -type f -o -type l \) \
              \( -name python3.11 -o -name python3 -o -name python \) \
              | head -n 1
          )"
          if [ -z "$py_bin" ]; then
            echo "Contents of extracted runtime:" >&2
            find "$extract_root" -maxdepth 4 | sed -n '1,120p' >&2
            echo "Could not find python executable in downloaded runtime." >&2
            exit 1
          fi
          py_root="$(cd "$(dirname "$py_bin")/.." && pwd)"
          echo "DJ_ASSIST_PYTHON_STANDALONE=$py_root" >> "$GITHUB_ENV"

      - name: Build desktop app
        run: |
          npm run build
          npm run prepare:standalone-assets
          npm run prepare:python-bundle
          npm run prepare:audio-tools
          npx electron-builder --mac dmg zip --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

      - name: Publish GitHub release assets
        if: steps.release_meta.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
          generate_release_notes: true
          prerelease: ${{ contains(steps.release_meta.outputs.tag, '-') }}
