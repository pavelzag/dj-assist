name: Release Desktop App
run-name: >-
  Release Desktop App
  (${{ github.ref_type == 'tag' && github.ref_name || github.event_name == 'workflow_dispatch' && (inputs.tag || 'patch bump') || 'master patch bump' }})

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish, for example v0.1.0 or v0.2.0-beta.1
        required: false
        type: string
      make_latest:
        description: Mark this release as the latest release on GitHub
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  bump-release:
    name: Bump Patch Release
    if: "${{ github.event_name == 'push' && github.ref_name == 'master' && !startsWith(github.event.head_commit.message, 'chore: release v') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump patch version, commit, and tag
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm version patch --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists locally." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin." >&2
            exit 1
          fi

          git add package.json package-lock.json
          git commit -m "chore: release ${tag}"
          git tag "${tag}"
          git push origin HEAD:refs/heads/${GITHUB_REF_NAME}
          git push origin "${tag}"

          {
            echo "## Patch Release Created"
            echo ""
            echo "- Version: \`${version}\`"
            echo "- Tag: \`${tag}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  prepare-release:
    name: Resolve Release Version
    if: "${{ github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' }}"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      should_bump_patch: ${{ steps.release.outputs.should_bump_patch }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release version
        id: release
        run: |
          set -euo pipefail
          should_bump_patch=false
          release_sha=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            if [ -z "${tag}" ]; then
              should_bump_patch=true
              version="$(node -p "const p=require('./package.json').version.split('.').map(Number); p[2] += 1; p.join('.')")"
              tag="v${version}"
            else
              version="${tag#v}"
            fi
          elif [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "master" ]; then
            should_bump_patch=true
            version="$(node -p "const p=require('./package.json').version.split('.').map(Number); p[2] += 1; p.join('.')")"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi

          if [ "${should_bump_patch}" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            npm version patch --no-git-tag-version
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"

            if git rev-parse "${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists locally." >&2
              exit 1
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists on origin." >&2
              exit 1
            fi

            git add package.json package-lock.json
            git commit -m "chore: release ${tag}"
            git tag "${tag}"
            release_sha="$(git rev-parse HEAD)"
            git push origin HEAD:refs/heads/${GITHUB_REF_NAME}
            git push origin "${tag}"
          else
            git fetch --tags origin
            if git rev-parse "${tag}" >/dev/null 2>&1; then
              release_sha="$(git rev-list -n 1 "${tag}")"
            else
              release_sha="$(git rev-parse HEAD)"
            fi
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "should_bump_patch=${should_bump_patch}" >> "$GITHUB_OUTPUT"
          echo "sha=${release_sha}" >> "$GITHUB_OUTPUT"

          {
            echo "## Release"
            echo ""
            echo "- Tag: \`${tag}\`"
            echo "- Version: \`${version}\`"
            echo "- Patch bump: \`${should_bump_patch}\`"
            echo "- SHA: \`${release_sha}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-macos:
    name: Build macOS ${{ matrix.flavor }} Release (${{ needs.prepare-release.outputs.tag }})
    needs: prepare-release
    if: "${{ github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || (github.ref_type == 'branch' && github.ref_name == 'master') }}"
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - debug
          - prod
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      USE_HARD_LINKS: 'false'
      ELECTRON_CACHE: ~/Library/Caches/electron
      ELECTRON_BUILDER_CACHE: ~/Library/Caches/electron-builder
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore Electron caches
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "npm ci attempt ${attempt}/3"
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "npm ci failed, likely due to a transient package or Electron download error. Retrying..."
            rm -rf node_modules
            sleep 10
          done

      - name: Install Chromaprint
        run: brew install chromaprint

      - name: Download standalone Python runtime
        env:
          PYTHON_STANDALONE_URL: ${{ vars.PYTHON_STANDALONE_URL_MACOS_ARM64 }}
          DEFAULT_PYTHON_STANDALONE_URL: https://github.com/astral-sh/python-build-standalone/releases/download/20260203/cpython-3.11.14%2B20260203-aarch64-apple-darwin-install_only.tar.gz
        run: |
          set -e
          if [ -z "${PYTHON_STANDALONE_URL}" ]; then
            PYTHON_STANDALONE_URL="${DEFAULT_PYTHON_STANDALONE_URL}"
            echo "Repository variable PYTHON_STANDALONE_URL_MACOS_ARM64 is not set. Falling back to ${PYTHON_STANDALONE_URL}."
          fi
          archive="$RUNNER_TEMP/python-standalone.tar.gz"
          extract_root="$RUNNER_TEMP/python-standalone-extract"
          mkdir -p "$extract_root"
          curl -L "$PYTHON_STANDALONE_URL" -o "$archive"
          tar -xf "$archive" -C "$extract_root"
          py_bin="$(
            find "$extract_root" \( -type f -o -type l \) \
              \( -name python3.11 -o -name python3 -o -name python \) \
              | head -n 1
          )"
          if [ -z "$py_bin" ]; then
            echo "Contents of extracted runtime:" >&2
            find "$extract_root" -maxdepth 4 | sed -n '1,120p' >&2
            echo "Could not find python executable in downloaded runtime." >&2
            exit 1
          fi
          py_root="$(cd "$(dirname "$py_bin")/.." && pwd)"
          echo "DJ_ASSIST_PYTHON_STANDALONE=$py_root" >> "$GITHUB_ENV"

      - name: Verify Google OAuth config
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_CLIENT_ID}" ]; then
            echo "GOOGLE_CLIENT_ID must be set as a repository variable or secret for release builds." >&2
            exit 1
          fi
          npm run verify:google-oauth-config

      - name: Build desktop app
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_CLIENT_ID}" ]; then
            echo "GOOGLE_CLIENT_ID must be set as a repository variable or secret for release builds." >&2
            exit 1
          fi
          node scripts/prepare-app-icon.cjs
          npm run dist:mac:${{ matrix.flavor }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.flavor }}-${{ needs.prepare-release.outputs.tag }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

      - name: Publish GitHub release assets
        if: ${{ matrix.flavor == 'prod' }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ needs.prepare-release.outputs.sha }}
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
          generate_release_notes: true
          prerelease: ${{ contains(needs.prepare-release.outputs.tag, '-') }}
          make_latest: ${{ github.event_name == 'workflow_dispatch' && toJSON(inputs.make_latest) || 'legacy' }}
