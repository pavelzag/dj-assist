name: Release Desktop App
run-name: >-
  Release Desktop App
  (${{ github.ref_type == 'tag' && github.ref_name || github.event_name == 'workflow_dispatch' && (inputs.tag || 'patch bump') || 'master patch bump' }})

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish, for example v0.1.0 or v0.2.0-beta.1
        required: false
        type: string
      notarize:
        description: Submit builds to Apple notarization
        required: false
        type: boolean
        default: false
      make_latest:
        description: Mark this release as the latest release on GitHub
        required: false
        type: boolean
        default: true

permissions:
  contents: write


jobs:
  bump-release:
    name: Bump Patch Release
    if: "${{ github.event_name == 'push' && github.ref_name == 'master' && !startsWith(github.event.head_commit.message, 'chore: release v') }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Bump patch version, commit, and tag
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm version patch --no-git-tag-version
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists locally." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin." >&2
            exit 1
          fi

          git add package.json package-lock.json
          git commit -m "chore: release ${tag}"
          git tag "${tag}"
          git push origin HEAD:refs/heads/${GITHUB_REF_NAME}
          git push origin "${tag}"

          {
            echo "## Patch Release Created"
            echo ""
            echo "- Version: \`${version}\`"
            echo "- Tag: \`${tag}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  prepare-release:
    name: Resolve Release Version
    if: "${{ github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' }}"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      should_bump_patch: ${{ steps.release.outputs.should_bump_patch }}
      should_notarize: ${{ steps.release.outputs.should_notarize }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve release version
        id: release
        run: |
          set -euo pipefail
          should_bump_patch=false
          should_notarize=false
          release_sha=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            should_notarize="${{ inputs.notarize }}"
            if [ -z "${tag}" ]; then
              should_bump_patch=true
              version="$(node -p "const p=require('./package.json').version.split('.').map(Number); p[2] += 1; p.join('.')")"
              tag="v${version}"
            else
              version="${tag#v}"
            fi
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
            should_notarize=true
          fi

          if [ "${should_bump_patch}" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            npm version patch --no-git-tag-version
            version="$(node -p "require('./package.json').version")"
            tag="v${version}"

            if git rev-parse "${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists locally." >&2
              exit 1
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag ${tag} already exists on origin." >&2
              exit 1
            fi

            git add package.json package-lock.json
            git commit -m "chore: release ${tag}"
            git tag "${tag}"
            release_sha="$(git rev-parse HEAD)"
            git push origin HEAD:refs/heads/${GITHUB_REF_NAME}
            git push origin "${tag}"
          else
            git fetch --tags origin
            if git rev-parse "${tag}" >/dev/null 2>&1; then
              release_sha="$(git rev-list -n 1 "${tag}")"
            else
              release_sha="$(git rev-parse HEAD)"
            fi
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "should_bump_patch=${should_bump_patch}" >> "$GITHUB_OUTPUT"
          echo "should_notarize=${should_notarize}" >> "$GITHUB_OUTPUT"
          echo "sha=${release_sha}" >> "$GITHUB_OUTPUT"

          {
            echo "## Release"
            echo ""
            echo "- Tag: \`${tag}\`"
            echo "- Version: \`${version}\`"
            echo "- Patch bump: \`${should_bump_patch}\`"
            echo "- Notarize: \`${should_notarize}\`"
            echo "- SHA: \`${release_sha}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build-macos:
    name: Build macOS ${{ matrix.flavor }} Release (${{ needs.prepare-release.outputs.tag }})
    needs: prepare-release
    if: "${{ github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || (github.ref_type == 'branch' && github.ref_name == 'master') }}"
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - free-prod
          - pro-prod
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'true'
      USE_HARD_LINKS: 'false'
      ELECTRON_CACHE: ~/Library/Caches/electron
      ELECTRON_BUILDER_CACHE: ~/Library/Caches/electron-builder
    steps:
      - name: Checkout current ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate Apple signing and notarization secrets
        env:
          APPLE_SIGNING_CERT_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERT_P12_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SHOULD_NOTARIZE: ${{ needs.prepare-release.outputs.should_notarize }}
        run: |
          set -euo pipefail
          required_vars=(
            APPLE_SIGNING_CERT_P12_BASE64
            APPLE_SIGNING_CERT_PASSWORD
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "${var_name} must be set for macOS signing/notarization." >&2
              exit 1
            fi
          done
          cert_path="$RUNNER_TEMP/apple-signing-cert-verify.p12"
          keychain_path="$RUNNER_TEMP/apple-signing-verify.keychain-db"
          keychain_password="$(openssl rand -base64 24)"
          printf '%s' "${APPLE_SIGNING_CERT_P12_BASE64}" | base64 --decode > "$cert_path"
          file "$cert_path"
          openssl pkcs12 -in "$cert_path" -passin "pass:${APPLE_SIGNING_CERT_PASSWORD}" -info -noout >/dev/null
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 900 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$APPLE_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security >/dev/null
          identities_output="$(security find-identity -v -p codesigning "$keychain_path" 2>&1 || true)"
          printf '%s\n' "$identities_output"
          if ! printf '%s\n' "$identities_output" | grep -q 'Developer ID Application:'; then
            echo "The signing certificate must include a 'Developer ID Application' identity for website distribution." >&2
            exit 1
          fi
          if [ "${SHOULD_NOTARIZE}" = "true" ]; then
            notarize_vars=(
              APPLE_API_KEY_P8
              APPLE_API_KEY_ID
              APPLE_API_ISSUER
              APPLE_TEAM_ID
            )
            for var_name in "${notarize_vars[@]}"; do
              if [ -z "${!var_name}" ]; then
                echo "${var_name} must be set for Apple notarization." >&2
                exit 1
              fi
            done
            apple_api_key_id="$(printf '%s' "${APPLE_API_KEY_ID}" | tr -d '\r\n[:space:]')"
            apple_api_issuer="$(printf '%s' "${APPLE_API_ISSUER}" | tr -d '\r\n[:space:]')"
            apple_team_id="$(printf '%s' "${APPLE_TEAM_ID}" | tr -d '\r\n[:space:]')"
            if [ -z "${apple_api_key_id}" ] || [ -z "${apple_api_issuer}" ] || [ -z "${apple_team_id}" ]; then
              echo "APPLE_API_KEY_ID, APPLE_API_ISSUER, and APPLE_TEAM_ID must not be blank after trimming whitespace." >&2
              exit 1
            fi
            api_key_path="$RUNNER_TEMP/AuthKey_${apple_api_key_id}.p8"
            printf '%s\n' "${APPLE_API_KEY_P8}" > "$api_key_path"
            chmod 600 "$api_key_path"
            grep -q '^-----BEGIN PRIVATE KEY-----$' "$api_key_path"
            grep -q '^-----END PRIVATE KEY-----$' "$api_key_path"
            xcrun notarytool history \
              --key "$api_key_path" \
              --key-id "$apple_api_key_id" \
              --issuer "$apple_api_issuer" >/dev/null
          fi
          echo "Apple signing and notarization credentials validated."

      - name: Restore Electron caches
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "npm ci attempt ${attempt}/3"
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            echo "npm ci failed, likely due to a transient package or Electron download error. Retrying..."
            rm -rf node_modules
            sleep 10
          done

      - name: Install Chromaprint
        run: brew install chromaprint

      - name: Download standalone Python runtime
        env:
          PYTHON_STANDALONE_URL: ${{ vars.PYTHON_STANDALONE_URL_MACOS_ARM64 }}
          DEFAULT_PYTHON_STANDALONE_URL: https://github.com/astral-sh/python-build-standalone/releases/download/20260203/cpython-3.11.14%2B20260203-aarch64-apple-darwin-install_only.tar.gz
        run: |
          set -e
          if [ -z "${PYTHON_STANDALONE_URL}" ]; then
            PYTHON_STANDALONE_URL="${DEFAULT_PYTHON_STANDALONE_URL}"
            echo "Repository variable PYTHON_STANDALONE_URL_MACOS_ARM64 is not set. Falling back to ${PYTHON_STANDALONE_URL}."
          fi
          archive="$RUNNER_TEMP/python-standalone.tar.gz"
          extract_root="$RUNNER_TEMP/python-standalone-extract"
          mkdir -p "$extract_root"
          curl -L "$PYTHON_STANDALONE_URL" -o "$archive"
          tar -xf "$archive" -C "$extract_root"
          py_bin="$(
            find "$extract_root" \( -type f -o -type l \) \
              \( -name python3.11 -o -name python3 -o -name python \) \
              | head -n 1
          )"
          if [ -z "$py_bin" ]; then
            echo "Contents of extracted runtime:" >&2
            find "$extract_root" -maxdepth 4 | sed -n '1,120p' >&2
            echo "Could not find python executable in downloaded runtime." >&2
            exit 1
          fi
          py_root="$(cd "$(dirname "$py_bin")/.." && pwd)"
          echo "DJ_ASSIST_PYTHON_STANDALONE=$py_root" >> "$GITHUB_ENV"

      - name: Import Apple signing certificate
        env:
          APPLE_SIGNING_CERT_P12_BASE64: ${{ secrets.APPLE_SIGNING_CERT_P12_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/apple-signing-cert.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(openssl rand -base64 24)"
          printf '%s' "${APPLE_SIGNING_CERT_P12_BASE64}" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$APPLE_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$keychain_path"

      - name: Write App Store Connect API key
        if: ${{ needs.prepare-release.outputs.should_notarize == 'true' }}
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          apple_api_key_id="$(printf '%s' "${APPLE_API_KEY_ID}" | tr -d '\r\n[:space:]')"
          api_key_path="$RUNNER_TEMP/AuthKey_${apple_api_key_id}.p8"
          printf '%s\n' "${APPLE_API_KEY_P8}" > "$api_key_path"
          chmod 600 "$api_key_path"
          echo "APPLE_API_KEY=$api_key_path" >> "$GITHUB_ENV"

      - name: Verify Google OAuth config
        if: ${{ matrix.flavor != 'free-prod' }}
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_CLIENT_ID}" ]; then
            echo "GOOGLE_CLIENT_ID must be set as a repository variable or secret for release builds." >&2
            exit 1
          fi
          npm run verify:google-oauth-config

      - name: Build desktop app
        env:
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          ONEDRIVE_CLIENT_ID: ${{ vars.ONEDRIVE_CLIENT_ID || secrets.ONEDRIVE_CLIENT_ID }}
          ONEDRIVE_CLIENT_SECRET: ${{ secrets.ONEDRIVE_CLIENT_SECRET }}
          DROPBOX_CLIENT_ID: ${{ vars.DROPBOX_CLIENT_ID || secrets.DROPBOX_CLIENT_ID }}
          DROPBOX_CLIENT_SECRET: ${{ secrets.DROPBOX_CLIENT_SECRET }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SHOULD_NOTARIZE: ${{ needs.prepare-release.outputs.should_notarize }}
        run: |
          set -euo pipefail
          export DJ_ASSIST_APP_FLAVOR="${{ matrix.flavor }}"
          export NEXT_PUBLIC_DJ_ASSIST_APP_FLAVOR="${{ matrix.flavor }}"
          if [ "${SHOULD_NOTARIZE}" = "true" ]; then
            export APPLE_API_KEY_ID="$(printf '%s' "${APPLE_API_KEY_ID}" | tr -d '\r\n[:space:]')"
            export APPLE_API_ISSUER="$(printf '%s' "${APPLE_API_ISSUER}" | tr -d '\r\n[:space:]')"
            export APPLE_TEAM_ID="$(printf '%s' "${APPLE_TEAM_ID}" | tr -d '\r\n[:space:]')"
          else
            unset APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER APPLE_TEAM_ID
          fi
          if [ "${{ matrix.flavor }}" != "free-prod" ] && [ -z "${GOOGLE_CLIENT_ID}" ]; then
            echo "GOOGLE_CLIENT_ID must be set as a repository variable or secret for release builds." >&2
            exit 1
          fi
          node scripts/prepare-app-icon.cjs
          npm run prepare:build-env
          npm run build
          npm run prepare:standalone-assets
          npm run prepare:python-bundle
          npm run prepare:audio-tools
          node scripts/electron-builder-flavored.cjs dmg

      - name: Verify artifact upload network
        run: |
          set -euo pipefail
          hosts=(
            https://github.com
            https://pipelines.actions.githubusercontent.com
            https://artifactcache.actions.githubusercontent.com
          )
          for attempt in 1 2 3; do
            all_ok=true
            for host in "${hosts[@]}"; do
              if ! curl -I --silent --show-error --max-time 10 "$host" >/dev/null; then
                all_ok=false
                break
              fi
            done
            if [ "$all_ok" = true ]; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "GitHub network check failed after ${attempt} attempts." >&2
              exit 1
            fi
            sleep 10
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.flavor }}-${{ needs.prepare-release.outputs.tag }}
          path: |
            dist-electron/${{ matrix.flavor }}/*.dmg

  publish-release:
    name: Publish Release Assets (${{ needs.prepare-release.outputs.tag }})
    needs:
      - prepare-release
      - build-macos
    if: "${{ github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || (github.ref_type == 'branch' && github.ref_name == 'master') }}"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS build artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: macos-*-${{ needs.prepare-release.outputs.tag }}
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN != '' && secrets.GH_RELEASE_TOKEN || github.token }}
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          target_commitish: ${{ needs.prepare-release.outputs.sha }}
          files: |
            release-assets/*.dmg
          generate_release_notes: true
          prerelease: ${{ contains(needs.prepare-release.outputs.tag, '-') }}
          make_latest: ${{ github.event_name == 'workflow_dispatch' && toJSON(inputs.make_latest) || 'legacy' }}
