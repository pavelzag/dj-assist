<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#06080e"/>
  <!-- outer ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#ff6c00" stroke-width="1.4"/>
  <!-- groove rings -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#ff6c00" stroke-width="0.6" opacity="0.55"/>
  <circle cx="16" cy="16" r="7"   fill="none" stroke="#ff6c00" stroke-width="0.6" opacity="0.35"/>
  <!-- label zone -->
  <circle cx="16" cy="16" r="4.5" fill="rgba(255,108,0,0.12)" stroke="#ff6c00" stroke-width="0.8"/>
  <!-- spindle -->
  <circle cx="16" cy="16" r="1.4" fill="#ff6c00"/>
  <!-- position marker -->
  <line x1="16" y1="2" x2="16" y2="6.5" stroke="#ff6c00" stroke-width="2" stroke-linecap="round"/>
</svg>
